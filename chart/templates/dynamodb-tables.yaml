{{/*
Merges each ACK Table doc generated by gen_ack_tables.py
(files/dynamodb-tables.json, a JSON array -- not templates/, which Helm excludes
from .Files) with an optional per-table override from .Values.dynamodbTables,
keyed by spec.tableName. Override merges at the document root (can touch
metadata and/or spec) and wins on conflicts; lists (e.g. tags) are replaced
wholesale, not appended to. See the repo README for the full contract.
*/}}
{{- $overrides := .Values.dynamodbTables | default dict -}}
{{- $tables := .Files.Get "files/dynamodb-tables.json" | fromJsonArray -}}
{{- $tableNames := list -}}
{{- range $table := $tables }}
  {{- $tableNames = append $tableNames $table.spec.tableName -}}
  {{- $override := index $overrides $table.spec.tableName -}}
  {{- $merged := $table -}}
  {{- if $override }}
    {{- $merged = mustMergeOverwrite (deepCopy $table) $override -}}
  {{- end }}
---
{{ toYaml $merged }}
{{- end }}
{{- range $name, $_ := $overrides }}
  {{- if not (has $name $tableNames) }}
    {{- fail (printf "dynamodbTables.%s does not match any generated table's spec.tableName (generated: %s)" $name (join ", " $tableNames)) }}
  {{- end }}
{{- end }}
