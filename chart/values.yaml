# Per-table overrides merged onto the ACK Table manifests generated by
# gen_ack_tables.py (files/dynamodb-tables.json), keyed by the table's
# spec.tableName. Use this for spec fields the generator doesn't derive from the
# pynamodb model (tags, deletionProtectionEnabled, continuousBackups,
# sseSpecification, streamSpecification, ...). Merges at the document root and wins
# on conflict; lists (e.g. tags) are replaced wholesale, not appended to. A key that
# doesn't match any generated table's spec.tableName is a template error.
dynamodbTables: {}
# Every field below is one the generator does NOT derive from the pynamodb model --
# an override here is the only way to set it. Keyed by spec.tableName; merges at the
# document root (spec and/or metadata):
#
# demo-Questions:
#   spec:
#     # Point-in-time recovery (continuous backups).
#     continuousBackups:
#       pointInTimeRecoveryEnabled: true
#     # CloudWatch Contributor Insights: ENABLED | DISABLED.
#     contributorInsights: ENABLED
#     # Block accidental table deletion.
#     deletionProtectionEnabled: true
#     # Caps for on-demand (PAY_PER_REQUEST) capacity; omit either for uncapped.
#     onDemandThroughput:
#       maxReadRequestUnits: 100
#       maxWriteRequestUnits: 100
#     # Resource-based policy: a JSON string (max 20 KB).
#     resourcePolicy: |
#       {"Version": "2012-10-17", "Statement": []}
#     # Server-side encryption. sseType: KMS | AES256.
#     sseSpecification:
#       enabled: true
#       sseType: KMS
#       kmsMasterKeyID: alias/aws/dynamodb
#     # DynamoDB Streams. streamViewType: KEYS_ONLY | NEW_IMAGE | OLD_IMAGE | NEW_AND_OLD_IMAGES.
#     streamSpecification:
#       streamEnabled: true
#       streamViewType: NEW_AND_OLD_IMAGES
#     # Global-table replicas, one entry per region.
#     tableReplicas:
#       - regionName: us-west-2
#       - regionName: eu-west-1
#     # Cost-allocation tags (list is replaced wholesale, not merged).
#     tags:
#       - key: team
#         value: platform
